<!DOCTYPE html><html lang="ar">  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>تسجيل الدخول</title>  
  <style>  
    :root {  
      --bg: #f0f4ff;  
      --card: #ffffff;  
      --text: #222;  
      --primary: #4a6cf7;  
    }  body.dark {  
  --bg: #0f172a;  
  --card: #1e293b;  
  --text: #f1f5f9;  
  --primary: #38bdf8;  
}  

body {  
  margin: 0;  
  font-family: "Segoe UI", sans-serif;  
  background: var(--bg);  
  color: var(--text);  
  direction: rtl;  
  transition: 0.3s;  
}  

.container {  
  padding: 20px;  
  margin-top: 70px;  
  display:flex;  
  justify-content:center;  
}  

.login-box {  
  width:100%;  
  max-width:350px;  
  background: var(--card);  
  padding: 25px;  
  border-radius: 20px;  
  text-align: center;  
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);  
  animation: fade 0.4s ease;  
}  

@keyframes fade{  
  from{opacity:0; transform:translateY(10px);}  
  to{opacity:1; transform:translateY(0);}  
}  

h2 {  
  margin-bottom: 20px;  
}  

select, button {  
  width: 100%;  
  padding: 14px;  
  margin: 10px 0;  
  border-radius: 12px;  
  border: none;  
  font-size: 16px;  
}  

select {  
  border: 1px solid #ccc;  
}  

button {  
  background: var(--primary);  
  color: white;  
  cursor: pointer;  
  transition:0.3s;  
}  

@media (hover: hover) and (pointer: fine) {
  button:hover {
    transform: scale(1.03);
  }
}
  button, select, input {
  -webkit-tap-highlight-color: transparent;
}

.msg{  
  font-size:13px;  
  color:red;  
  margin-top:5px;  
  display:none;  
}  

.toggle-mode {  
  position: absolute;  
  top: 15px;  
  left: 15px;  
}  

.switch {  
  width: 62.5px;  
  height: 35px;  
  border-radius: 50px;  
  display: flex;  
  align-items: center;  
  justify-content: space-between;  
  padding: 0 8px;  
  cursor: pointer;  
  position: relative;  
  background: var(--card);  
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);  
  transition: 0.3s;  
}  

.icon {  
  font-size: 14px;  
  z-index: 1;  
}  

.circle {  
  width: 28px;  
  height: 28px;  
  background: white;  
  border-radius: 50%;  
  position: absolute;  
  left: 3.5px;  
  transition: 0.3s;  
  display: flex;  
  align-items: center;  
  justify-content: center;  
  font-size: 14px;  
}  

body.dark .circle {  
  left: 47px;  
}  
  
body:not(.dark) .circle{  
  background: #1e293b;     
}  
body.dark .switch {  
  background: #1e293b;  
}  

body:not(.dark) .switch {  
  background: #ffffff;  
}  

/* 🆕 زر اختيار الدور */
#selectRoleBtn {
  background: #e5e7eb;
  color: var(--text);
  border: 1px solid #d1d5db; 
  text-align: right;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
  #selectRoleBtn span {
  display: inline-block;
}

body.dark #selectRoleBtn:not(.active) {
  background: #ffffff;
  color: #000;
}

#selectRoleBtn.active {
  background: var(--primary);
  color: white;
  border: none;
}

.modal-overlay {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

#roleModal {
  display: none;
  position: fixed;
  z-index: 1001;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 70%;
  max-width: 280px;
  background: var(--card);
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  text-align: center;
}

.close-btn {
  position: absolute;
  right: 15px;
  top: 15px;
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: var(--primary);
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.1);
  border-radius: 50%;
}

.close-btn:hover {
  color: var(--primary);
  background: rgba(0,0,0,0.1);
  border-radius: 50%;
}

.role-box {
  margin: 20px 0;
}

.role-row {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
  gap: 0px;
}

.role-row span {
  flex: 1;
  font-weight: 500;
  font-size: 20px;
  border: 1px solid #ddd;
  border-radius: 0px 8px 8px 0px ;
  padding-top: 3px;
  padding-bottom: 3px;
  border-color: var(--primary);
}

.pin-input {
  width: 70px;
  height: 40px;
  padding: 0 10px;
  border: 1px solid #ddd;
  border-radius: 8px 0px 0px 8px;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
  letter-spacing: 3px;
  inputmode: numeric;
  direction: ltr;
}

.pin-input:focus {
  outline: none;
  border-color: var(--primary);
}

.pin-correct {
  border-color: #10b981 !important;
  background: #d1fae5 !important;
}

.pin-wrong {
  border-color: #ef4444 !important;
  background: #fee2e2 !important;
  animation: shake 0.5s;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

.modal-title {
  margin-bottom: 15px;
  font-size: 18px;
}

  </style>  
</head>  
<body>    
  <div class="toggle-mode">  
    <div class="switch" onclick="toggleMode()">  
      <span class="icon">🌙</span>  
      <div class="circle" id="icon"></div>  
      <span class="icon">☀️</span>  
    </div>  
  </div>    
  <div class="container">  
    <div class="login-box">  
      <h2>🔐 تسجيل الدخول</h2>    <!-- 🆕 الزر -->
  <button id="selectRoleBtn" style="padding:14px; font-size:16px; margin-bottom:10px;">
    <span id="roleText">اختر دورك 🔑</span>
    <span style="float:left;">▼</span>
  </button>

  <div class="msg" id="msg">⚠️ من فضلك اختر دورك أولاً</div>  

  <button id="loginBtn" onclick="login()">دخول</button>  
</div>

  </div>    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
  <div id="roleModal">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <h3 class="modal-title">أدخل رمز فصلك</h3><div class="role-box">
  <div class="role-row" data-role="اولى_ولاد">
    <span>أولى ولاد</span>
    <input class="pin-input" maxlength="4" placeholder="____">
  </div>
  
  <div class="role-row" data-role="اولى_بنات">
    <span>أولى بنات</span>
    <input class="pin-input" maxlength="4" placeholder="____">
  </div>
  
  <div class="role-row" data-role="تانية_ولاد">
    <span>تانية ولاد</span>
    <input class="pin-input" maxlength="4" placeholder="____">
  </div>
  
  <div class="role-row" data-role="تانية_بنات">
    <span>تانية بنات</span>
    <input class="pin-input" maxlength="4" placeholder="____">
  </div>
</div>

  </div>  <script>  
    const rolePins = {
      'اولى_ولاد': '1234',
      'اولى_بنات': '5678', 
      'تانية_ولاد': '9012',
      'تانية_بنات': '3456'
    };

    let selectedRole = null;
    let isRoleSelected = false;

    if (localStorage.getItem("mode") === "dark") {  
      document.body.classList.add("dark");  
    }  
  
    window.onload = function () {  
      let isDark = document.body.classList.contains("dark");  
      let icon = document.getElementById("icon");  
      icon.innerText = isDark ? "🌙" : "☀️";  
    };  
  
    function toggleMode() {  
      document.body.classList.toggle("dark");  
      let isDark = document.body.classList.contains("dark");  
      localStorage.setItem("mode", isDark ? "dark" : "light");  
      document.getElementById("icon").innerText = isDark ? "🌙" : "☀️";  
    }  

    document.getElementById('selectRoleBtn').onclick = function(e) {
      e.preventDefault();
      document.getElementById('roleModal').style.display = 'block';
      document.getElementById('modalOverlay').style.display = 'block';
      document.getElementById('msg').style.display = 'none';
      setTimeout(() => {
        document.querySelector('.pin-input').focus();
      }, 200);
    };

    function closeModal() {
      document.getElementById('roleModal').style.display = 'none';
      document.getElementById('modalOverlay').style.display = 'none';
      
      if (!isRoleSelected) {
        document.querySelectorAll('.pin-input').forEach(input => {
          input.value = '';
          input.classList.remove('pin-correct', 'pin-wrong');
        });
      }
    }

    document.querySelectorAll('.pin-input').forEach(input => {
      input.addEventListener('input', function() {
        const role = this.closest('.role-row').dataset.role;
        const pin = this.value.trim();
        
        this.classList.remove('pin-correct', 'pin-wrong');
        
        if (pin.length === 4) {
          if (pin === rolePins[role]) {
            this.classList.add('pin-correct');
            selectedRole = role;
            isRoleSelected = true;

            const roleNames = {
              'اولى_ولاد': 'أولى ولاد',
              'اولى_بنات': 'أولى بنات',
              'تانية_ولاد': 'تانية ولاد',
              'تانية_بنات': 'تانية بنات'
            };

            const btn = document.getElementById('selectRoleBtn');
            document.getElementById('roleText').innerText = roleNames[role];
            btn.classList.add('active');
            
            setTimeout(() => {
              closeModal();
              document.getElementById('loginBtn').style.background = '#10b981';
            }, 500);
          } else {
            this.classList.add('pin-wrong');
            setTimeout(() => {
              this.value = '';
              this.classList.remove('pin-wrong');
            }, 1200);
          }
        }
      });
    });

    function login() {  
      let msg = document.getElementById("msg");  
      let btn = document.getElementById("loginBtn");  
      
      if (!selectedRole || !isRoleSelected) {  
        msg.innerHTML = "⚠️ اختر دورك وأدخل الرمز الصحيح أولاً";
        msg.style.display = "block";  
        return;  
      }  
  
      msg.style.display = "none";  
  
      btn.innerText = "جاري الدخول...";  
      btn.disabled = true;  
  
      setTimeout(() => {  
        localStorage.setItem("role", selectedRole);  
        window.location.href = "main-attendance.html";  
      }, 800);  
    }  
  </script>  </body>  
</html>
