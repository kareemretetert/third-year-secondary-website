<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>لوحة إدارة التلخيصات</title>

<style>

body{
font-family:Tajawal, Tahoma;
direction:rtl;
background:#f0f2f5;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

h2{
margin-top:40px;
}

input,textarea,button{
width:100%;
margin-top:10px;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
height:120px;
}

button{
background:#2e7d32;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.card{
background:white;
padding:15px;
margin-top:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card-title{
font-size:18px;
font-weight:bold;
}

.card-date{
color:#777;
font-size:14px;
margin-top:5px;
}

.deleteBtn{
margin-top:10px;
background:#d32f2f;
}

.deleteBtn:hover{
background:#b71c1c;
}

</style>

</head>

<body>

<div class="container">

<h2>إضافة تلخيص جديد</h2>

<label>العنوان</label>
<input id="title">

<label>التاريخ</label>
<input type="date" id="date">

<label>المحتوى</label>
<textarea id="content"></textarea>

<label>إضافة صور</label>
<input type="file" id="images" multiple accept="image/*">

<label>إضافة فيديوهات</label>
<input type="file" id="videos" multiple accept="video/*">

<label>إضافة ملفات</label>
<input type="file" id="files" multiple>

<button id="publish">نشر التلخيص</button>

<h2>التلخيصات الحالية</h2>

<div id="summariesList"></div>

</div>

<script>
const password="kimo123";
const entered=prompt("ادخل كلمة المرور");
if(entered!==password){
  document.body.innerHTML="<h2 style='text-align:center;margin-top:100px'>كلمة المرور غير صحيحة</h2>";
  throw new Error("access denied");
}

let summaries=[];
const publishBtn = document.getElementById("publish");

// spinner
const spinner = document.createElement("div");
spinner.style.textAlign="center";
spinner.style.marginTop="10px";
spinner.style.display="none";
spinner.innerHTML="⏳ جاري رفع الملفات...";
document.querySelector(".container").prepend(spinner);

// عرض التلخيصات
function renderSummaries(){
  const container=document.getElementById("summariesList");
  container.innerHTML="";
  if(!summaries.length){
    container.innerHTML="<p style='color:#777'>لا يوجد تلخيصات حالياً</p>";
    return;
  }
  summaries.forEach((s,i)=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="card-title">${s.title}</div>
      <div class="card-date">📅 ${s.date}</div>
      <p>${s.content.substring(0,120)}...</p>
      <div class="files-container">
      ${[...s.images,...s.videos,...s.files].map(f=>{
        return `<div class="file-item">
          <div class="file-name">${f.split('/').pop()}</div>
          <div class="progress-wrapper"><div class="progress-bar" style="width:100%"></div></div>
          <div class="file-buttons">
            <a href="${f}" target="_blank" class="viewBtn">فتح</a>
            <a href="${f}" download class="downloadBtn">تحميل</a>
          </div>
        </div>`;
      }).join('')}
      </div>
      <button class="deleteBtn" onclick="deleteSummary(${i})">حذف</button>
    `;
    container.appendChild(card);
  });
}

// تحميل التلخيصات
async function loadSummaries(){
  try{
    const res=await fetch("summaries.json");
    summaries=await res.json();
    if(!Array.isArray(summaries)) summaries=[];
    renderSummaries();
  }catch{
    document.getElementById("summariesList").innerHTML="<p style='color:#777'>لا يمكن تحميل التلخيصات</p>";
  }
}
window.onload=loadSummaries;

// رفع الملفات مع تحسين جودة الفيديو
async function uploadToCloudinary(file){
  let resourceType="auto";
  if(file.type.includes("pdf") || file.type.includes("application")) resourceType="raw";
  const url=`https://api.cloudinary.com/v1_1/dvicie9uq/${resourceType}/upload`;
  const formData=new FormData();
  formData.append("file",file);
  formData.append("upload_preset","my_upload_new");
  formData.append("folder","summaries-site-2");
  if(file.type.startsWith("video")){
    formData.append("quality","auto");
    formData.append("fetch_format","auto");
  }
  const res=await fetch(url,{method:"POST",body:formData});
  const data=await res.json();
  if(!data.secure_url) throw "upload failed";
  return data.secure_url;
}

// نشر التلخيص
publishBtn.onclick=async()=>{
  publishBtn.disabled=true;
  spinner.style.display="block";

  const title=document.getElementById("title").value;
  const date=document.getElementById("date").value;
  const content=document.getElementById("content").value;

  if(!title || !date || !content){
    alert("اكتب كل البيانات");
    publishBtn.disabled=false;
    spinner.style.display="none";
    return;
  }

  const imageFiles = document.getElementById("images").files;
  const videoFiles = document.getElementById("videos").files;
  const fileFiles = document.getElementById("files").files;

  // رفع متوازي لكل نوع
  const imagePromises = Array.from(imageFiles).map(async f=>{
    const url = await uploadToCloudinary(f);
    return url;
  });
  const videoPromises = Array.from(videoFiles).map(async f=>{
    const url = await uploadToCloudinary(f);
    return url;
  });
  const filePromises = Array.from(fileFiles).map(async f=>{
    const url = await uploadToCloudinary(f);
    return url;
  });

  const images = await Promise.all(imagePromises);
  const videos = await Promise.all(videoPromises);
  const files = await Promise.all(filePromises);

  const newSummary={title,date,content,images,videos,files};
  summaries.unshift(newSummary);

  await updateJSONFile(summaries);
  renderSummaries();

  publishBtn.disabled=false;
  spinner.style.display="none";
  alert("تم نشر التلخيص 🎉");
}

// حذف تلخيص
async function deleteSummary(index){
  if(!confirm("هل تريد حذف هذا التلخيص؟")) return;
  summaries.splice(index,1);
  await updateJSONFile(summaries);
  renderSummaries();
}

// تحديث JSON
async function updateJSONFile(data){
  await fetch("/.netlify/functions/save",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
}
</script>
</body>
</html>
