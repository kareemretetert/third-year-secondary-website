<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الأرشيف</title>

  <!-- Plyr -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma;
      direction: rtl;
      background-color: #f0f8ff;
      padding: 20px;
    }

    .back-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      background-image: linear-gradient(to left,#cf98d6d2,rgb(181, 70, 196));
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
      border: 2px solid #38373a;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 { font-size: 2rem; }

    .container {
      display: flex;
      flex-direction: column;
      gap: 30px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background-color: white;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      padding: 20px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.7s ease forwards;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h2 {
      color: #5c2c8a;
      font-size: 1.3rem;
      text-align: center;
    }

    img {
      max-width: 100%;
      display: block;
      margin: 10px auto;
      border-radius: 10px;
    }

    /* تحسين الفيديو */
    .plyr {
      margin-top: 15px;
      border-radius: 12px;
      overflow: hidden;
    }

    .file-box{
      background:#fafafa;
      border-radius:10px;
      padding:15px;
      margin-top:15px;
      text-align:center;
    }

    .file-name{
      font-weight:bold;
      margin-bottom:10px;
    }

    .view-btn{
      display:inline-block;
      margin:8px;
      padding:8px 15px;
      border-radius:20px;
      text-decoration:none;
      color:white;
      font-weight:bold;
      background:#1976d2;
      transition: 0.3s;
    }

    .view-btn:hover{
      background:#125aa0;
    }

    iframe{
      width:100%;
      height:400px;
      margin-top:10px;
      border-radius:10px;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

<div class="back-buttons">
  <a class="btn" href="index.html">الصفحة الرئيسية ⬅</a>
  <a class="btn" href="meatingSummrise.html">العودة</a>
</div>

<div class="header">
  <h1>📚 أرشيف الاجتماعات</h1>
</div>

<div class="container" id="archive"></div>

<script>

fetch("summaries.json")
.then(res => res.json())
.then(list => {

const archive = document.getElementById("archive")

const archived = list.slice(1)

if(!archived.length){
archive.innerHTML = "<p style='text-align:center;color:#777;'>لا يوجد أرشيف حالياً</p>"
return
}

archived.forEach((data,index)=>{

if(!data || !data.title) return

const card = document.createElement("div")
card.className = "card"
card.style.animationDelay = `${index * 0.15}s`

let contentHTML = `
<h2>${data.title}</h2>
<p>📅 التاريخ: ${data.date || ""}</p>
`

// 🖼 الصور
if(data.images){
data.images.forEach(img=>{
contentHTML += `<img src="${img}">`
})
}

// 🎥 الفيديو (Plyr)
if(data.videos){
data.videos.forEach(v=>{
contentHTML += `
<video class="plyr-video" controls>
  <source src="${v}" type="video/mp4">
</video>
`
})
}

// 📄 الملفات
if(data.files){
data.files.forEach(f=>{

const ext = f.split('.').pop().toLowerCase()
const fileName = decodeURIComponent(f.split('/').pop())

let fileType = "📄 ملف"
if(ext === "pdf") fileType = "📕 PDF"
else if(ext === "doc" || ext === "docx") fileType = "📝 Word"
else if(ext === "ppt" || ext === "pptx") fileType = "📊 PowerPoint"

contentHTML += `
<div class="file-box">

<div class="file-name">
${fileType} - ${fileName}
</div>

<a href="${f}" target="_blank" class="view-btn">
عرض 📄
</a>
`

// preview PDF
if(ext === "pdf"){
contentHTML += `<iframe src="${f}"></iframe>`
}

contentHTML += `</div>`

})
}

// 📝 النص
contentHTML += `<p>${data.content || ""}</p>`

card.innerHTML = contentHTML
archive.appendChild(card)

})

// تشغيل Plyr بعد تحميل العناصر
setTimeout(() => {
  Plyr.setup('.plyr-video', {
    controls: [
      'play-large',
      'rewind',
      'play',
      'fast-forward',
      'progress',
      'current-time',
      'duration',
      'mute',
      'volume',
      'settings',
      'download',
      'fullscreen'
    ],
    seekTime: 10
  });
}, 500);

})
.catch(()=>{
document.getElementById("archive").innerHTML =
"<p style='text-align:center;color:#777;'>لا يمكن تحميل الأرشيف</p>"
})

</script>

</body>
</html>
