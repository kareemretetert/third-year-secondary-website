<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النتيجة</title>

<style>
:root{
--primary:#6a3ab2;
--bg:#f4f6fb;
--card:#ffffff;
--text:#222;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:Tahoma, sans-serif;
background:var(--bg);
padding:10px;
text-align:center;
}

h2{margin:10px 0;color:var(--primary);}

p{margin:6px 0;}

.card{
background:#fff;
padding:15px;
margin:12px auto;
border-radius:12px;
max-width:900px;
}

.question-box{
display:flex;
gap:12px;
align-items:flex-start;
}

.question-text{
flex:2;
text-align:right;
font-size:15px;
}

.img-container{
flex:1;
position:relative;
}

.question-img{
width:100%;
border-radius:10px;
cursor:pointer;
}

.fullscreen-icon{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
color:#fff;
border-radius:10px;
width:32px;
height:32px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.fullscreen-icon::before{content:"⛶";}

.correct{color:green;}
.wrong{color:red;}

button{
margin-top:20px;
padding:12px;
border:none;
border-radius:10px;
background:var(--primary);
color:#fff;
font-size:15px;
cursor:pointer;
width:100%;
max-width:300px;
}

#imageModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

#imageModal img{
max-width:90%;
max-height:90%;
}

/* ✅ Responsive */
@media (max-width:768px){

.question-box{
flex-direction:column;
}

.question-text{
font-size:14px;
}

}

@media (max-width:480px){

body{padding:5px;}

.card{padding:10px;}

}

</style>
</head>

<body>

<h2>نتيجة الامتحان</h2>

<p id="name"></p>
<p id="quizName"></p>
<p id="score"></p>

<div id="answers"></div>

<button onclick="goBack()">العودة للامتحانات</button>

<div id="imageModal" onclick="closeImage()">
<img id="modalImg">
</div>

<script>
// 🟢 البيانات
const name=localStorage.getItem("quiz_username")
const score=localStorage.getItem("quiz_score")
const total=localStorage.getItem("quiz_total")
const quizTitle=localStorage.getItem("quiz_title")

document.getElementById("name").innerText="👤 الاسم: "+name
document.getElementById("quizName").innerText="📝 الامتحان: "+quizTitle
document.getElementById("score").innerText="📊 الدرجة: "+score+" / "+total

let percent = Math.round((score / total) * 100)

let message=""

if(percent >= 90){
message="ممتاز 👏"
}else if(percent >= 75){
message="عاش 🔥"
}else if(percent >= 50){
message="مقبول 👍"
}else{
message="اعمل أفضل المرة القادمة 💪"
}

const percentBox=document.createElement("p")
percentBox.innerText="📈 النسبة: "+percent+"% - "+message
document.body.appendChild(percentBox)

const doneBox = document.createElement("p")
doneBox.innerText = "✅ تم إنهاء الامتحان"
doneBox.style.color = "green"
document.body.appendChild(doneBox)

// الإجابات
const answers=JSON.parse(localStorage.getItem("quiz_answers"))

const container=document.getElementById("answers")

answers.forEach((a,i)=>{

let chosenText = a.chosen ? a.options[a.chosen-1] : "لم يتم اختيار"
let correctText = a.options[a.correct-1]
let isCorrect = a.chosen == a.correct

let html=`
<div class="card">

<div class="question-box">

<div class="question-text">
<b>س${i+1}:</b> ${a.question}
</div>
`

// 📸 صورة (لو موجودة)
if(a.image){
html+=`
<div class="img-container">
<img src="${a.image}" class="question-img" onclick="openImage('${a.image}')">
<div class="fullscreen-icon" onclick="openImage('${a.image}')"></div>
</div>
`
}

html+=`</div>

<p class="${isCorrect ? 'correct' : 'wrong'}">
اختيارك: ${a.chosen ? a.chosen : "—"} (${chosenText})
</p>

<p class="correct">
الإجابة الصحيحة: ${a.correct} (${correctText})
</p>

<p>
${isCorrect ? "✔ إجابة صحيحة" : "❌ إجابة خاطئة"}
</p>

</div>
`

container.innerHTML+=html

})

// 🔍 فتح الصورة
function openImage(src){
const modal=document.getElementById("imageModal")
const img=document.getElementById("modalImg")

img.src=src
modal.style.display="flex"
}

// ❌ غلق
function closeImage(){
document.getElementById("imageModal").style.display="none"
}

function goBack(){
window.location="quiz_list.html"
}</script>

</body>
</html>
