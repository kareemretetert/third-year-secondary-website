<script>
  // منع المتصفح يحفظ مكان السكروول
history.scrollRestoration = "manual";

// تفعيل السلوك الناعم للسكروول
document.documentElement.style.scrollBehavior = "smooth";
const password="kimo123"
const entered=prompt("ادخل كلمة المرور")

if(entered!==password){
document.body.innerHTML="<h2 style='text-align:center;margin-top:100px'>كلمة المرور غير صحيحة</h2>"
throw new Error("access denied")
}

let quizzes=[]
let questions=[]
let editIndex = null;
// تحميل الامتحانات
// المتغير اللي هيخزن الاختيار
let selectedAnswer = null;

// الفنكشن لتحديد الإجابة
function selectAnswer(num){
    selectedAnswer = num;

    let all = document.querySelectorAll(".answer-options div");
    all.forEach(el => el.classList.remove("active"));

    document.querySelector(`.answer-options div[data-value="${num}"]`).classList.add("active");
}
async function loadQuizzes(){
try{
const res=await fetch("quiz.json")
quizzes=await res.json()
renderQuiz()
}catch{
document.getElementById("quizList").innerHTML="لا يوجد امتحانات"
}
}
window.onload = function(){

loadQuizzes()

// 📥 استرجاع الأسئلة
let saved = localStorage.getItem("questionsDraft")
if(saved){
questions = JSON.parse(saved)
renderQuestions()
}

// 📥 استرجاع العنوان والوقت
document.getElementById("quizTitle").value = localStorage.getItem("quizTitle") || ""
document.getElementById("quizTime").value = localStorage.getItem("quizTime") || 30

}

// 📸 رفع صورة
async function compressImage(file){

return new Promise((resolve) => {

const img = new Image()
const reader = new FileReader()

reader.onload = function(e){
img.src = e.target.result
}

img.onload = function(){

const canvas = document.createElement("canvas")

// 📉 تقليل الحجم
let maxWidth = 800
let scale = maxWidth / img.width

canvas.width = maxWidth
canvas.height = img.height * scale

const ctx = canvas.getContext("2d")
ctx.drawImage(img, 0, 0, canvas.width, canvas.height)

// 🧠 تحويل لصورة مضغوطة
canvas.toBlob((blob)=>{
resolve(blob)
}, "image/jpeg", 0.7) // الجودة 70%
}

reader.readAsDataURL(file)

})
}



async function uploadImage(file){

// ✨ ضغط الصورة قبل الرفع
const compressed = await compressImage(file)

const url = "https://api.cloudinary.com/v1_1/ddiegmhji/image/upload"

const formData = new FormData()
formData.append("file", compressed)
formData.append("upload_preset", "my_upload")

const res = await fetch(url,{
method:"POST",
body:formData
})

const data = await res.json()

if(!data.secure_url) throw "upload failed"

return data.secure_url
}


  function showError(msg){
let box=document.getElementById("errorBox")
box.style.display="block"
box.innerText=msg
}

function hideError(){
document.getElementById("errorBox").style.display="none"
}
// ➕ إضافة سؤال
async function addQuestion(){

showLoader()

try{

const q=document.getElementById("question").value

let options=[]
const o1=document.getElementById("opt1").value
const o2=document.getElementById("opt2").value
const o3=document.getElementById("opt3").value
const o4=document.getElementById("opt4").value

if(o1) options.push(o1)
if(o2) options.push(o2)
if(o3) options.push(o3)
if(o4) options.push(o4)

const answer = selectedAnswer;

// ❌ تحقق أقوى
if(!answer){
    hideLoader()
    showError("لازم تختار رقم الإجابة الصحيحة")
    return
}

if(isNaN(answer)){
hideLoader()
showError("الإجابة لازم تكون رقم")
return
}

if(answer < 1 || answer > options.length){
hideLoader()
showError("رقم الإجابة غير صحيح")
return
}

if(!q || options.length < 2){
hideLoader()
showError("يجب إدخال سؤال واختيارين على الأقل")
return
}

// 📸 صورة
let imageUrl = ""
const imageFile = document.getElementById("questionImage").files[0]

if(imageFile){
try{
imageUrl = await uploadImage(imageFile)
}catch{
hideLoader()
showError("فشل رفع الصورة")
return
}
}

if(editIndex !== null){
questions[editIndex] = {
question:q,
options:options,
answer:answer,
image:imageUrl
}
editIndex = null
}else{
questions.push({
question:q,
options:options,
answer:answer,
image:imageUrl
})
}

renderQuestions()
  
document.getElementById("qCount").innerText="عدد الأسئلة: "+questions.length

clearFields()

hideLoader()
showError("تم إضافة السؤال")
}catch(e){
hideLoader()
showError("حصل خطأ")
console.log(e)
}

}

async function publishQuiz(){

showLoader()

try{

const title=document.getElementById("quizTitle").value
const time=document.getElementById("quizTime").value

if(!title || questions.length==0){
hideLoader()
showError("اكتب اسم الامتحان وأضف أسئلة")

const newQuiz={

function moveUp(index){
    if(index <= 0) return;

    let temp = questions[index];
    questions[index] = questions[index - 1];
    questions[index - 1] = temp;

    renderQuestions();
}

function moveDown(index){
    if(index >= questions.length - 1) return;

    let temp = questions[index];
    questions[index] = questions[index + 1];
    questions[index + 1] = temp;

    renderQuestions();
}

}

  
function toggleQuestion(i){

let body = document.getElementById("body-"+i)
let arrow = document.getElementById("arrow-"+i)

if(body.style.display === "none"){
body.style.display = "block"
arrow.innerText = "▼"
}else{
body.style.display = "none"
arrow.innerText = "▶"
}

}

  let currentEditIndex = null;

function openEdit(i){
    currentEditIndex = i
    let q = questions[i]

    document.getElementById("editModal").style.display="flex"

    // نص السؤال والاختيارات
    document.getElementById("editQuestionText").value = q.question
    document.getElementById("editOpt1").value = q.options[0] || ""
    document.getElementById("editOpt2").value = q.options[1] || ""
    document.getElementById("editOpt3").value = q.options[2] || ""
    document.getElementById("editOpt4").value = q.options[3] || ""

    // ✅ اختيار الإجابة الصحيحة تلقائيًا
    editSelectedAnswer = q.answer
    document.querySelectorAll("#editAnswerOptions div").forEach(el => el.classList.remove("active"))
    if(q.answer){
        const activeDiv = document.querySelector(`#editAnswerOptions div[data-value="${q.answer}"]`)
        if(activeDiv) activeDiv.classList.add("active")
    }

    // النص
    document.getElementById("editImgText").innerText = q.image ? "📸 يوجد صورة حالية" : "لم يتم اختيار صورة"

    // المعاينة
    let preview = document.getElementById("editPreview")
    if(q.image){
        preview.src = q.image
        preview.style.display = "block"
    }else{
        preview.style.display = "none"
    }

    // ربط تغيير الصورة مباشرة
    let input = document.getElementById("editImage")
    input.value = "" // مهم جداً
    input.onchange = function (){
        let file = this.files[0]
        if(file){
            preview.src = URL.createObjectURL(file)
            preview.style.display = "block"
            document.getElementById("editImgText").innerText = "📸 " + file.name
        }else{
            preview.style.display = "none"
            document.getElementById("editImgText").innerText = "لم يتم اختيار صورة"
        }
    }
}



let editSelectedAnswer = null;

function selectEditAnswer(num){
    editSelectedAnswer = num;

    let all = document.querySelectorAll("#editAnswerOptions div");
    all.forEach(el => el.classList.remove("active"));

    document.querySelector(`#editAnswerOptions div[data-value="${num}"]`).classList.add("active");
}


  
async function saveEdit(){
    showLoader()

    try{
        let q = questions[currentEditIndex]

        // إذا تم اختيار صورة جديدة
        let newImage = document.getElementById("editImage").files[0]
        if(newImage){
            q.image = await uploadImage(newImage)
        }

        // تحقق من اختيار الإجابة
        if(!editSelectedAnswer){
            hideLoader();
            alert("اختر الإجابة الصحيحة");
            return;
        }

        // حفظ الإجابة الصحيحة
        q.answer = editSelectedAnswer

        // حفظ الاختيارات
        q.options = [
            document.getElementById("editOpt1").value,
            document.getElementById("editOpt2").value,
            document.getElementById("editOpt3").value,
            document.getElementById("editOpt4").value
        ].filter(Boolean)

        // تحقق من صحة السؤال والخيارات
        if(!q.question || q.options.length < 2){
            hideLoader()
            alert("لازم سؤال واختيارين على الأقل")
            return
        }

        if(q.answer < 1 || q.answer > q.options.length){
            hideLoader()
            alert("الإجابة غير صحيحة")
            return
        }

        closeEdit()
        renderQuestions()
        hideLoader()

    }catch(e){
        hideLoader()
        alert("فشل التعديل")
        console.log(e)
    }
}


function forceShowQuestions(){
    hidden = false

    let list = document.getElementById("questionsList")
    let btn = document.getElementById("toggleBtn")

    list.style.display = "block"
    btn.innerText = "إخفاء الأسئلة"
}
  

  
function closeEdit(){
  document.getElementById("editModal").style.display="none";
  currentEditIndex = null;
}

modal.style.display = "none"
}
}
