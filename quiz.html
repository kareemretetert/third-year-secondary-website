<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الامتحان</title>

<style>

body{
font-family:Tahoma;
direction:rtl;
background:#f0f8ff;
text-align:center;
padding:30px;
}

/* 📦 السؤال */
.question{
background:white;
padding:20px;
margin:20px auto;
max-width:700px;
border-radius:10px;
}

/* 🔥 layout السؤال + الصورة */
.question-box{
display:flex;
gap:20px;
align-items:center;
flex-wrap:wrap;
}

/* 📝 النص */
.question-text{
flex:2;
text-align:right;
font-size:18px;
}

/* 📸 حاوية الصورة */
.img-container{
position:relative;
flex:1;
max-width:250px;
width:100%;
}

/* 📸 الصورة */
.question-img{
width:100%;
height:180px;
border-radius:10px;
object-fit:contain;
cursor:pointer;
transition:0.3s;
}

.question-img:hover{
transform:scale(1.05);
}

/* ⛶ أيقونة fullscreen زي يوتيوب */
.fullscreen-icon{
position:absolute;
bottom:12px;
left:50%;
  top:70%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
color:white;
border-radius:6px;
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
}

.fullscreen-icon:hover{
background:black;
}

/* شكل الأيقونة */
.fullscreen-icon::before{
content:"⛶";
font-size:18px;
}

/* الخيارات */
.option{
display:block;
margin:8px;
text-align:right;
}

button{
padding:10px 20px;
border:none;
background:#4CAF50;
color:white;
border-radius:10px;
cursor:pointer;
}

/* ⏱ التايمر */
#timerBox{
width:300px;
margin:20px auto;
text-align:center;
}

#timerText{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

#timerBarContainer{
width:100%;
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

#timerBar{
height:10px;
width:100%;
background:#4CAF50;
transition:width 1s linear;
}

/* 🔍 نافذة تكبير الصورة */
#imageModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:999;
}

#imageModal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* 📱 موبايل */
@media(max-width:600px){
.question-box{
flex-direction:column;
}

.img-container{
max-width:100%;
}

.question-img{
height:auto;
}
}

</style>

</head>

<body>

<h2>الامتحان</h2>

<div id="timerBox">
<div id="timerText">10:00</div>

<div id="timerBarContainer">
<div id="timerBar"></div>
</div>
</div>

<div id="quizContainer"></div>

<button onclick="finishQuiz()">إنهاء</button>

<!-- 🔍 Modal -->

<div id="imageModal" onclick="closeImage()">
<img id="modalImg">
</div>

<script>

let questions=[]
let time=0

const quizIndex=localStorage.getItem("quizIndex")

fetch("quiz.json")
.then(res=>res.json())
.then(data=>{

const quiz=data[quizIndex]

questions=quiz.questions
time = quiz.time * 60

startTimer()
renderQuiz()

})

// 🎯 عرض الأسئلة
function renderQuiz(){

const container=document.getElementById("quizContainer")

questions.forEach((q,i)=>{

let html=`
<div class="question">

<div class="question-box">

<div class="question-text">
<b>س${i+1}:</b> ${q.question}
</div>
`

// 📸 صورة + أيقونة fullscreen
if(q.image){
html+=`
<div class="img-container">
<img src="${q.image}" class="question-img" onclick="openImage('${q.image}')">
<div class="fullscreen-icon" onclick="openImage('${q.image}')"></div>
</div>
`
}

html+=`</div>`

// الاختيارات
q.options.forEach((opt,index)=>{

html+=`
<label class="option">
<input type="radio" name="q${i}" value="${index+1}">
${index+1} - ${opt}
</label>
`

})

html+="</div>"

container.innerHTML+=html

})

}

// 🔍 فتح الصورة
function openImage(src){
const modal=document.getElementById("imageModal")
const img=document.getElementById("modalImg")

img.src=src
modal.style.display="flex"
}

// ❌ غلق الصورة
function closeImage(){
document.getElementById("imageModal").style.display="none"
}

// ⏱ التايمر
function startTimer(){

const totalTime = time
const bar=document.getElementById("timerBar")

const t=setInterval(()=>{

time--

let minutes = Math.floor(time / 60)
let seconds = time % 60

if(seconds < 10) seconds = "0"+seconds
if(minutes < 10) minutes = "0"+minutes

document.getElementById("timerText").innerText =
minutes + ":" + seconds

let percent = (time / totalTime) * 100
bar.style.width = percent + "%"

if(percent < 30){
bar.style.background = "red"
}

if(time<=0){
clearInterval(t)
finishQuiz()
}

},1000)

}

// 💾 حفظ النتيجة
async function saveResult(score,total){

try{

const name = localStorage.getItem("quiz_username") || "بدون اسم"
const index = localStorage.getItem("quizIndex")

const res = await fetch("quiz.json")
const quizzes = await res.json()
const quizTitle = quizzes[index]?.title || "امتحان"

const result = {
name,
score,
total,
quiz: quizTitle,
date: new Date().toISOString(),
finished: true
}

let old=[]
try{
const r = await fetch("results.json")
old = await r.json()
if(!Array.isArray(old)) old=[]
}catch{}

old.push(result)

await fetch("/.netlify/functions/saveResults",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(old)
})

}catch(e){
console.log("خطأ في الحفظ", e)
}

}

// ✅ إنهاء الامتحان
async function finishQuiz(){

let score=0
let answers=[]

questions.forEach((q,i)=>{

const selected=document.querySelector(`input[name=q${i}]:checked`)
const chosen = selected ? parseInt(selected.value) : null

answers.push({
question:q.question,
options:q.options,
correct:q.answer,
chosen:chosen,
image:q.image   // 👈 ده المهم
})

if(chosen == q.answer){
score++
}

})

localStorage.setItem("quiz_score",score)
localStorage.setItem("quiz_total",questions.length)
localStorage.setItem("quiz_answers",JSON.stringify(answers))

try{
await saveResult(score,questions.length)
}catch(e){
console.log("فشل الحفظ", e)
}

setTimeout(()=>{
window.location="results.html"
},500)

}

</script>

</body>
</html>
