<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الامتحان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--primary:#6a1b9a;
--bg:#f4f6fb;
--card:#ffffff;
--text:#222;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Cairo',sans-serif;
background:var(--bg);
padding:10px;
}

h2{
text-align:center;
margin:10px 0;
color:var(--primary);
}

.box{
background:#fff;
padding:12px;
margin:10px auto;
border-radius:12px;
max-width:900px;
}

#timerText{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
}

#timerBarContainer,
#progressBarContainer{
width:100%;
height:8px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

#timerBar,
#progressBar{
height:100%;
width:100%;
background:green;
}

#quizContainer{
max-width:900px;
margin:auto;
}

.question{
background:#fff;
padding:15px;
margin:12px 0;
border-radius:12px;
}

.question-box{
display:flex;
gap:10px;
align-items:flex-start;
}

.question-text{
flex:2;
font-size:16px;
line-height:1.5;
}

.img-container{
flex:1;
}

.question-img{
width:100%;
border-radius:10px;
cursor:pointer;
}

.option{
display:block;
background:#eee;
padding:8px;
margin:6px 0;
border-radius:8px;
cursor:pointer;
}

.option input{display:none;}

.option input:checked + span{
font-weight:bold;
color:var(--primary);
}

.finish-btn{
width:100%;
max-width:300px;
margin:20px auto;
display:block;
padding:12px;
border:none;
border-radius:10px;
background:var(--primary);
color:#fff;
font-size:16px;
cursor:pointer;
}

#imageModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

#imageModal img{
max-width:90%;
max-height:90%;
}

/* ✅ Responsive */
@media (max-width:768px){

.question-box{
flex-direction:column;
}

.question-text{
font-size:15px;
}

#timerText{
font-size:20px;
}

}

@media (max-width:480px){

body{
padding:5px;
}

.question{
padding:10px;
}

.option{
font-size:14px;
}

}

</style>
</head>

<body>

<h2>📝 الامتحان</h2>

<div class="box">
<div id="timerText">00:00</div>
<div id="timerBarContainer"><div id="timerBar"></div></div>
</div>

<div class="box">
<div id="progressText">0 / 0</div>
<div id="progressBarContainer"><div id="progressBar"></div></div>
</div>

<div id="quizContainer"></div>

<button class="finish-btn" onclick="finishQuiz()">إنهاء الامتحان</button>

<div id="imageModal" onclick="closeImage()">
<img id="modalImg">
</div>

<script>

let questions=[]
let time=0
const quizIndex=localStorage.getItem("quizIndex")

fetch("quiz.json")
.then(res=>res.json())
.then(data=>{
const quiz=data[quizIndex]
questions=quiz.questions
time=quiz.time * 60
startTimer()
renderQuiz()
})

function renderQuiz(){

const container=document.getElementById("quizContainer")

questions.forEach((q,i)=>{

let html=`
<div class="question">

<div class="question-box">

<div class="question-text">
<b>س${i+1}:</b> ${q.question}
</div>
`

if(q.image){
html+=`
<div class="img-container">
<img src="${q.image}" class="question-img" onclick="openImage('${q.image}')">
</div>
`
}

html+=`</div>`

q.options.forEach((opt,index)=>{
html+=`
<label class="option">
<input type="radio" name="q${i}" value="${index+1}" onchange="updateProgress()">
<span>${opt}</span>
</label>
`
})

html+="</div>"

container.innerHTML+=html

})

}

function openImage(src){
document.getElementById("modalImg").src=src
document.getElementById("imageModal").style.display="flex"
}

function closeImage(){
document.getElementById("imageModal").style.display="none"
}

function startTimer(){

const total=time
const bar=document.getElementById("timerBar")

setInterval(()=>{

time--

let m=Math.floor(time/60)
let s=time%60

if(s<10) s="0"+s
if(m<10) m="0"+m

document.getElementById("timerText").innerText=m+":"+s

let percent=(time/total)*100
bar.style.width=percent+"%"

if(percent<30) bar.style.background="red"
else bar.style.background="#4CAF50"

if(time<=0){
finishQuiz()
}

},1000)

}

function updateProgress(){

let answered=0

questions.forEach((q,i)=>{
if(document.querySelector(`input[name=q${i}]:checked`)) answered++
})

let total=questions.length
document.getElementById("progressText").innerText=answered+" / "+total

let percent=(answered/total)*100
let bar=document.getElementById("progressBar")

bar.style.width=percent+"%"

if(percent<30) bar.style.background="red"
else if(percent<70) bar.style.background="orange"
else bar.style.background="green"

}
async function saveResult(score,total){

try{

const name = localStorage.getItem("quiz_username") || "بدون اسم"
const index = localStorage.getItem("quizIndex")

const res = await fetch("quiz.json")
const quizzes = await res.json()
const quizTitle = quizzes[index]?.title || "امتحان"

const result = {
name,
score,
total,
quiz: quizTitle,
date: new Date().toISOString(),
finished: true
}

let old=[]
try{
const r = await fetch("results.json")
old = await r.json()
if(!Array.isArray(old)) old=[]
}catch{}

old.push(result)

await fetch("/.netlify/functions/saveResults",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(old)
})

}catch(e){
console.log("خطأ في الحفظ", e)
}

}
async function finishQuiz(){

let unanswered=0

questions.forEach((q,i)=>{
if(!document.querySelector(`input[name=q${i}]:checked`)) unanswered++
})

if(unanswered){
alert("أكمل باقي الأسئلة")
return
}

let score=0
let answers=[]

questions.forEach((q,i)=>{
let chosen=parseInt(document.querySelector(`input[name=q${i}]:checked`).value)

answers.push({
question:q.question,
options:q.options,
correct:q.answer,
chosen:chosen,
image:q.image
})

if(chosen==q.answer) score++
})

localStorage.setItem("quiz_score",score)
localStorage.setItem("quiz_total",questions.length)
localStorage.setItem("quiz_answers",JSON.stringify(answers))

try{
await saveResult(score,questions.length)
}catch(e){
console.log("فشل الحفظ", e)
}

setTimeout(()=>{
window.location="results.html"
},500)

}
</script>

</body>
</html>
