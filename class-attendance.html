<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حضور الفصل</title>

<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
  window.firebase = { initializeApp, getFirestore, collection, onSnapshot, updateDoc, doc, query, orderBy, getApps };
</script>

<style>
/* 🔥 نفس الـ variables زي الصفحة الأولى */
:root{
  --bg:#f0f4ff;
  --card:#fff;
  --text:#222;
  --primary:#4a6cf7;
  --green:#22c55e;
  --red:#ef4444;
  --gray:#94a3b8;
}

body.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f1f5f9;
  --primary:#38bdf8;
  --gray:#64748b;
}

body{
  margin:0;
  font-family:"Segoe UI";
  background:var(--bg);
  color:var(--text);
  direction:rtl;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 12px 12px 12px;
  background:var(--card);
  position:relative;
  height: 40px;
}

.title{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-weight:bold;
}

.class-btn{
  background:var(--primary);
  padding:8px 12px;
  border-radius:10px;
  color:white;
  border:none;
}

/* ✅ toggle mode */
.toggle-mode {  
  position: absolute;  
  top: 15px;  
  left: 15px;  
}  

.switch {  
  width: 62.5px;  
  height: 35px;  
  border-radius: 50px;  
  display: flex;  
  align-items: center;  
  justify-content: space-between;  
  padding: 0 8px;  
  cursor: pointer;  
  position: relative;  
  background: var(--card);  
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);  
  transition: 0.3s;  
}  

.icon {  
  font-size: 14px;  
  z-index: 1;  
}  

.circle {  
  width: 28px;  
  height: 28px;  
  background: white;  
  border-radius: 50%;  
  position: absolute;  
  left: 3.5px;  
  transition: 0.3s;  
  display: flex;  
  align-items: center;  
  justify-content: center;  
  font-size: 14px;  
}  

body.dark .circle {  
  left: 47px;  
}  
  
body:not(.dark) .circle{  
  background: #1e293b;     
}  
body.dark .switch {  
  background: #1e293b;  
}  

body:not(.dark) .switch {  
  background: #ffffff;  
}

/* 🔥 Header Bar كامل - Stats + Search */
.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 15px 20px 15px;
  gap: 15px;
  padding: 12px;
  background: var(--card);
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

/* 🔥 Stats */
.stats-container {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.3);
  font-weight: bold;
  font-size: 13px;
  min-width: 42px;
  text-align: center;
}

.stat-present { 
  background: rgba(34,197,94,0.25); 
  color: var(--green);
}
.stat-absent { 
  background: rgba(239,68,68,0.25); 
  color: var(--red);
}
.stat-pending { 
  background: rgba(148,163,184,0.25); 
  color: var(--gray);
}

/* 🔥 Search */
.search-container {
  display: flex;
  align-items: center;
  width: 220px;
  height: 36px;
  background-color: var(--card);
  border: 1px solid var(--gray);
  border-radius: 18px;
  overflow: hidden;
  box-sizing: border-box;
  flex-shrink: 0;
  transition: all 0.3s ease;
}

.search-container:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(74,108,247,0.15);
}

.search-input {
  flex: 1;
  height: 100%;
  background: transparent;
  border: none;
  padding: 0 14px 0 8px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  direction: rtl;
}

.search-input::placeholder {
  color: var(--gray);
  font-weight: 400;
  opacity: 0.8;
}

.search-button {
  width: 42px;
  height: 100%;
  background-color: rgba(74,108,247,0.05);
  border: none;
  border-left: 1px solid var(--gray);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  border-radius: 0;
}

.search-container:focus-within .search-button {
  border-left: 1px solid var(--primary);
}

.search-button:hover {
  background-color: var(--primary);
}

.search-icon {
  width: 16px;
  height: 16px;
  fill: var(--text);
  opacity: 0.9;
}

.search-button:hover .search-icon {
  fill: white;
}

/* ✅ student card (مطابق للصفحة الأولى) */
.student{
  margin:10px;
  padding:12px;
  border-radius:15px;
  background:var(--card);
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:.3s;
  position: relative;
}

.present-bg{
  border-right:5px solid var(--green);
  background:rgba(34,197,94,0.25);
}

.absent-bg{
  border-right:5px solid var(--red);
  background:rgba(239,68,68,0.25);
}

.neutral-bg{
  border-right:5px solid #94a3b8;
  background:rgba(148,163,184,0.15);
}

.locked{
  border-right:5px solid #64748b;
  background:rgba(100,116,139,0.15);
  opacity: 0.6;
  pointer-events:none;
}

.lock-icon{
  position:absolute;
  left:10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  z-index: 2;
}

/* ✅ زرَّي الحضور (مطابق للصفحة الأولى) */
button{
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

.present, .absent {
  background: var(--gray);
  stroke: var(--gray);
}

/* ✅ زرَّي الحضور (مطابق للشكل في الصفحة الأولى) */
.present, .absent {
  background: var(--gray);
  stroke: var(--gray);
  color: white;
}

.present.active {
  background: var(--green);
  stroke: var(--green);
  color: white;
  box-shadow: 0 0 10px rgba(34,197,94,0.7);
}

.absent.active {
  background: var(--red);
  stroke: var(--red);
  color: white;
  box-shadow: 0 0 10px rgba(239,68,68,0.7);
}

/* حفظ – زر واحد */
.save{
  width:90%;
  margin:10px auto;
  display:block;
  padding:15px;
  border-radius:15px;
  background:var(--primary);
  color:white;
}

/* mobile */
@media (max-width: 480px) {
  .header-bar {
    flex-direction: column;
    gap: 12px;
    padding: 15px;
  }
  .search-container {
    width: 100%;
    max-width: 280px;
  }
  .stat-item {
    padding: 5px 8px;
    font-size: 12px;
    min-width: 38px;
  }
}
</style>
</head>

<body>

<!-- Header -->
<header>
  <button class="class-btn" onclick="goBack()">رجوع</button>
  <div class="title">📊 حضور الفصل</div>

  <div class="toggle-mode">  
    <div class="switch" onclick="toggleMode()">  
      <span class="icon">🌙</span>  
      <div class="circle" id="icon"></div>  
      <span class="icon">☀️</span>  
    </div>  
  </div>
</header>

<!-- 🔥 Header Bar (Stats + Search) -->
<div class="header-bar">
  <div class="stats-container">
    <div class="stat-item stat-present">
      <span>✔️</span><span id="presentCount">0</span>
    </div>
    <div class="stat-item stat-absent">
      <span>❌</span><span id="absentCount">0</span>
    </div>
    <div class="stat-item stat-pending">
      <span>⏳</span><span id="pendingCount">0</span>
    </div>
  </div>

  <div class="search-container">
    <button class="search-button" onclick="render()">
      <svg class="search-icon" viewBox="0 0 24 24">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
    </button>
    <input type="text" class="search-input" id="search" placeholder="ابحث..." oninput="render()">
  </div>
</div>

<div id="list"></div>

<button class="save" onclick="save()">💾 حفظ</button>

<script>
let students = [];
let currentClass = localStorage.getItem("role");
let db = null;

const firebaseConfig = {
  apiKey: "AIzaSyBmDbj5Mcv2JTccocwIKiK4E-Jr5RtVpqw",
  authDomain: "attendance-system-d12bd.firebaseapp.com",
  projectId: "attendance-system-d12bd",
  storageBucket: "attendance-system-d12bd.firebasestorage.app",
  messagingSenderId: "1040656901088",
  appId: "1:1040656901088:web:84ebaf3855e455c2a24185"
};

async function initFirebase() {
  if (!firebase.getApps().length) {
    const app = firebase.initializeApp(firebaseConfig);
    db = firebase.getFirestore(app);
  } else {
    db = firebase.getFirestore();
  }

  const q = firebase.query(firebase.collection(db, "students"), firebase.orderBy("name"));

  firebase.onSnapshot(q, (snap) => {
    students = [];
    snap.forEach(doc => {
      students.push({ id: doc.id, ...doc.data() });
    });
    render();
  });
}

function isAllowedTime(){
  return true;
}

function render() {
  let list = document.getElementById("list");
  let search = document.getElementById("search").value.toLowerCase();
  list.innerHTML = "";

  const locked = !isAllowedTime();

  students
    .filter(s => s.class === currentClass)
    .filter(s => s.name.toLowerCase().includes(search))
    .forEach(s => {
      let cls = "";
      if (locked) cls = "locked";
      else if (s.status2 === true) cls = "present-bg";
      else if (s.status2 === false) cls = "absent-bg";
      else cls = "neutral-bg";

      const lockIcon = locked ? '<span class="lock-icon">🔒</span>' : '';

      list.innerHTML += `
      <div class="student ${cls}">
        ${lockIcon}
        <span>${s.name}</span>
        <div>
          <button class="present ${s.status2 === true ? 'active' : ''}" onclick="mark('${s.id}',true)" ${locked ? 'disabled' : ''}>
            <svg width="18" height="18" viewBox="0 0 24 24" style="stroke: var(--gray);">
              <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="3" fill="none"/>
            </svg>
          </button>
          <button class="absent ${s.status2 === false ? 'active' : ''}" onclick="mark('${s.id}',false)" ${locked ? 'disabled' : ''}>
            <svg width="18" height="18" viewBox="0 0 24 24" style="stroke: var(--gray);">
              <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="3"/>
            </svg>
          </button>
        </div>
      </div>`;
    });

  updateStats();
}

async function mark(id, val) {
  if (!isAllowedTime()) return;
  await firebase.updateDoc(firebase.doc(db, "students", id), {
    status2: val
  });
}

async function save() {
  const promises = students
    .filter(s => s.class === currentClass)
    .map(s => {
      return firebase.updateDoc(firebase.doc(db, "students", s.id), {
        status2: null
      });
    });

  await Promise.all(promises);
  alert("تم الحفظ ✅");
}

function updateStats() {
  let p = students.filter(s => s.class === currentClass && s.status2 === true).length;
  let a = students.filter(s => s.class === currentClass && s.status2 === false).length;
  let r = students.filter(s => s.class === currentClass && s.status2 == null).length;

  document.getElementById("presentCount").textContent = p;
  document.getElementById("absentCount").textContent = a;
  document.getElementById("pendingCount").textContent = r;
}

function goBack() {
  window.location.href = "main-attendance.html";
}

/* dark mode */
if (localStorage.getItem("mode") === "dark") {
  document.body.classList.add("dark");
}

function toggleMode() {
  document.body.classList.toggle("dark");
  let isDark = document.body.classList.contains("dark");
  localStorage.setItem("mode", isDark ? "dark" : "light");
  document.getElementById("icon").innerText = isDark ? "🌙" : "☀️";
}

window.onload = function () {
  let isDark = document.body.classList.contains("dark");
  document.getElementById("icon").innerText = isDark ? "🌙" : "☀️";
  initFirebase();
};
</script>

</body>
</html>
