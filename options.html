

<!DOCTYPE html>  <html lang="ar">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>لوحة التقارير الذكية</title>  <!-- Firebase SDK (v9 compat) -->  <script src="https://www.gstatic.com/firebasejs/9.25.0/firebase-app-compat.js"></script>  <script src="https://www.gstatic.com/firebasejs/9.25.0/firebase-firestore-compat.js"></script>  <!-- Chart.js -->  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>  <!-- DevTools في الموبايل -->  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>  <script>eruda.init();</script>  <style>  
:root{  
  --bg:#f0f4ff;  
  --card:#fff;  
  --text:#222;  
  --primary:#4a6cf7;  
  --green:#22c55e;  
  --red:#ef4444;  
  --border:#e5e7eb;  
}  
  
body.dark{  
  --bg:#0f172a;  
  --card:#1e293b;  
  --text:#f1f5f9;  
  --border:#334155;  
}  
  
body{  
  margin:0;  
  font-family:Arial;  
  background:var(--bg);  
  color:var(--text);  
  direction:rtl;  
  transition:0.3s;  
}  
  
/* header */  
header{  
  padding:15px;  
  text-align:center;  
  background:var(--card);  
  font-weight:bold;  
  box-shadow:0 5px 15px rgba(0,0,0,0.1);  
  position: relative;  
}  
  
/* Toggle Mode */  
.toggle-mode {  
  position: absolute;  
  top: 10px;  
  left: 10px;  
  z-index: 10;  
}  
.toggle-mode .switch {  
  width: 62.5px;  
  height: 35px;  
  border-radius: 50px;  
  display: flex;  
  align-items: center;  
  justify-content: space-between;  
  padding: 0 8px;  
  cursor: pointer;  
  background: var(--card);  
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);  
  transition:0.3s;  
}  
.toggle-mode .icon { font-size: 14px; z-index: 1; }  
.toggle-mode .circle {  
  width: 28px;  
  height: 28px;  
  background: white;  
  border-radius: 50%;  
  position: absolute;  
  left: 3.5px;  
  transition:0.3s;  
  display: flex;  
  align-items: center;  
  justify-content: center;  
  font-size: 14px;  
}  
body.dark .circle { left: 47px; }  
body:not(.dark) .circle { background: #1e293b; }  
body.dark .switch { background: #1e293b; }  
body:not(.dark) .switch { background: #ffffff; }  
  
/* Tabs */  
.tabs{  
  display:flex;  
  gap:5px;  
  padding:10px;  
  flex-wrap:wrap;  
}  
.tabs .tab{  
  flex:1;  
  padding:10px;  
  border:none;  
  border-radius:10px;  
  background:var(--primary);  
  color:#fff;  
  cursor:pointer;  
  font-size:12px;  
  transition:0.3s;  
}  
.tabs .tab:hover{ transform:scale(1.05); }  
  
/* container */  
.container{  
  padding:15px;  
  display:flex;  
  flex-direction:column;  
  gap:15px;  
}  
  
/* cards */  
.cards{  
  display:grid;  
  grid-template-columns:1fr 1fr;  
  gap:10px;  
}  
.cards .card{  
  background:var(--card);  
  padding:15px;  
  border-radius:15px;  
  text-align:center;  
  font-weight:bold;  
  box-shadow:0 5px 10px rgba(0,0,0,0.05);  
  animation:fade 0.4s ease;  
}  
@keyframes fade{  
  from{opacity:0; transform:translateY(10px);}  
  to{opacity:1; transform:translateY(0);}  
}  
  
/* filters */  
input,select{  
  width:100%;  
  padding:12px;  
  border-radius:10px;  
  border:1px solid var(--border);  
  background:var(--card);  
  color:var(--text);  
}  
  
/* Search */  
.search-container {  
  display: flex;  
  align-items: center;  
  width: 220px;  
  height: 36px;  
  background-color: var(--card);  
  border: 1px solid var(--border);  
  border-radius: 18px;  
  overflow: hidden;  
  flex-shrink: 0;  
  transition: all 0.3s ease;  
}  
.search-container:focus-within {  
  border-color: var(--primary);  
  box-shadow: 0 0 0 2px rgba(74,108,247,0.15);  
}  
.search-input {  
  flex: 1;  
  height: 100%;  
  background: transparent;  
  border: none;  
  padding: 0 14px 0 8px;  
  color: var(--text);  
  font-size: 13px;  
  outline: none;  
  direction: rtl;  
}  
.search-input::placeholder {  
  color: var(--text);  
  font-weight: 400;  
}  
.search-button {  
  width: 42px;  
  height: 100%;  
  background-color: rgba(74,108,247,0.05);  
  border: none;  
  border-left: 1px solid var(--border);  
  display: flex;  
  align-items: center;  
  justify-content: center;  
  cursor: pointer;  
  border-radius: 0;  
}  
.search-container:focus-within .search-button {  
  border-left: 1px solid var(--primary);  
}  
.search-icon {  
  width: 16px;  
  height: 16px;  
  fill: var(--text);  
  opacity: 0.9;  
}  
.search-button:hover {  
  background-color: var(--primary);  
}  
.search-button:hover .search-icon {  
  fill: white;  
}  
  
/* sections */  
.section{  
  display:none;  
  animation:fade 0.4s ease;  
}  
.box{  
  background:var(--card);  
  padding:10px;  
  border-radius:15px;  
}  
  
/* table */  
table{  
  width:100%;  
  border-collapse:collapse;  
  background:var(--card);  
  border-radius:12px;  
  overflow:hidden;  
}  
th,td{  
  padding:10px;  
  border:1px solid var(--border);  
  text-align:center;  
  font-size:13px;  
}  
th{  
  background:var(--primary);  
  color:#fff;  
}  
  
/* insight */  
.insight{  
  background:var(--card);  
  padding:12px;  
  border-radius:15px;  
  font-weight:bold;  
  text-align:center;  
}  
  
/* button */  
.btn{  
  width:100%;  
  padding:12px;  
  border:none;  
  border-radius:12px;  
  background:var(--primary);  
  color:#fff;  
  font-size:15px;  
  cursor:pointer;  
}  
</style>  </head>  <body>  <header>📊 لوحة التقارير الذكية</header>  <!-- Toggle Mode -->  <div class="toggle-mode">  
  <div class="switch" onclick="toggleDarkMode()">  
    <span class="icon">🌙</span>  
    <div class="circle" id="darkIcon"></div>  
    <span class="icon">☀️</span>  
  </div>  
</div>  <!-- Tabs -->  <div class="tabs">  
<button class="tab" onclick="show('summary')">📊 ملخص</button>  
<button class="tab" onclick="show('charts')">📈 رسوم</button>  
<button class="tab" onclick="show('table')">🏫 جدول</button>  
<button class="tab" onclick="show('insight')">🧠 تحليل</button>  
<button class="tab" onclick="show('export')">📁 تصدير</button>  
</div>  <div class="container">  <!-- 🔍 Search -->  <div style="display: flex; align-items: center; justify-content: center; margin: 10px 0;">  
  <div class="search-container">  
    <button class="search-button" onclick="render()">  
      <svg class="search-icon" viewBox="0 0 24 24">  
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>  
      </svg>  
    </button>  
    <input type="text" class="search-input" id="search" placeholder="🔍 ابحث عن طالب..." onkeyup="render()">  
  </div>  
</div>  <!-- فلتر الفصل -->  <select id="classFilter" onchange="render()">  
  <option value="all">كل الفصول</option>  
  <option value="اولى_ولاد">أولى ولاد</option>  
  <option value="اولى_بنات">أولى بنات</option>  
  <option value="تانية_ولاد">تانية ولاد</option>  
  <option value="تانية_بنات">تانية بنات</option>  
</select>  <!-- ملخص -->  <div id="summary" class="section">  
  <div class="cards">  
    <div class="card" id="present">✔️ الحضور: 0</div>  
    <div class="card" id="absent">❌ الغياب: 0</div>  
    <div class="card" id="rate">📊 نسبة الحضور: 0%</div>  
    <div class="card" id="best">🏆 أفضل فصل: -</div>  
  </div>  
</div>  <!-- رسوم -->  <div id="charts" class="section">  
  <div class="box"><canvas id="bar"></canvas></div>  
  <div class="box"><canvas id="pie"></canvas></div>  
  <div class="box"><canvas id="line"></canvas></div>  
</div>  <!-- جدول -->  <div id="table" class="section">  
  <table>  
    <thead>  
      <tr>  
        <th>الاسم</th>  
        <th>الاجتماع</th>  
        <th>الفصل</th>  
        <th>الحالة</th>  
      </tr>  
    </thead>  
    <tbody id="tableBody"></tbody>  
  </table>  
</div>  <!-- تحليل -->  <div id="insight" class="section">  
  <div class="insight" id="insightText"></div>  
</div>  <!-- تصدير -->  <div id="export" class="section">  
  <button class="btn" onclick="alert('تم تحميل التقرير (مثلاً إلى CSV أو PDF)')">  
    📁 تحميل التقرير  
  </button>  
</div>  </div>  <!-- 🛠️ هنا نضع كل الـ Firebase للتأكد إنها بعد تحميل الـ Scripts -->  <script>  
  // ✅ تعريف المتغيرات قبل الـ Firebase  
  var students = [];  
  var barChart, pieChart, lineChart;  
  
  // ✅ Firebase Config  
  const firebaseConfig = {  
    apiKey: "AIzaSyBmDbj5Mcv2JTccocwIKiK4E-Jr5RtVpqw",  
    authDomain: "attendance-system-d12bd.firebaseapp.com",  
    projectId: "attendance-system-d12bd",  
    storageBucket: "attendance-system-d12bd.firebasestorage.app",  
    messagingSenderId: "1040656901088",  
    appId: "1:1040656901088:web:84ebaf3855e455c2a24185"  
  };  
  
  // Initialize Firebase  
  firebase.initializeApp(firebaseConfig);  
  const db = firebase.firestore();  
  
  // 🔁 Real‑time listener  
  db.collection("students").onSnapshot(snapshot => {  
    console.log("✅ onSnapshot تُنادَى");  
  
    if (snapshot.empty) {  
      console.log("❌_firestore الـ students collection فارغة");  
      students = [];  
      render();  
      return;  
    }  
  
    console.log("✅ عدد الطلاب في_firestore:", snapshot.docs.length);  
  
    students = snapshot.docs.map(doc => {  
      const data = doc.data();  
      console.log("الطالب في التقرير:", data);  
      return data;  
    });  
  
    console.log("الـ students في التقرير:", students);  
  
    render();  
  }, err => {  
    console.error("Firebase error:", err);  
  });  
</script>  <script>  
  // 👁️ UI: تغيير القسم المعروض  
  function show(id) {  
    document.querySelectorAll(".section").forEach(s => s.style.display = "none");  
    document.getElementById(id).style.display = "block";  
  }  
  show("summary");  
  
  // 💡 DARK MODE  
  function toggleDarkMode() {  
    document.body.classList.toggle("dark");  
    localStorage.setItem("mode", document.body.classList.contains("dark") ? "dark" : "light");  
    document.getElementById("darkIcon").innerText = document.body.classList.contains("dark") ? "🌙" : "☀️";  
  }  
  if (localStorage.getItem("mode") === "dark") {  
    document.body.classList.add("dark");  
  } else {  
    document.body.classList.remove("dark");  
  }  
  
  // 📊 رسوم  
  function draw(present, absent, rate) {  
    if (barChart) barChart.destroy();  
    if (pieChart) pieChart.destroy();  
    if (lineChart) lineChart.destroy();  
  
    // تأكد من وجود الـ canvas  
    if (!document.getElementById("bar")) return;  
    if (!document.getElementById("pie")) return;  
    if (!document.getElementById("line")) return;  
  
    barChart = new Chart(document.getElementById("bar"), {  
      type: "bar",  
      data: {  
        labels: ["حضور", "غياب"],  
        datasets: [{ data: [present, absent], backgroundColor: ["#22c55e", "#ef4444"] }]  
      },  
      options: { maintainAspectRatio: false }  
    });  
  
    pieChart = new Chart(document.getElementById("pie"), {  
      type: "pie",  
      data: {  
        labels: ["حضور", "غياب"],  
        datasets: [{ data: [present, absent], backgroundColor: ["#22c55e", "#ef4444"] }]  
      }  
    });  
  
    lineChart = new Chart(document.getElementById("line"), {  
      type: "line",  
      data: {  
        labels: ["اليوم"],  
        datasets: [{ data: [rate], borderColor: "#4a6cf7", tension: 0.4 }]  
      },  
      options: { maintainAspectRatio: false }  
    });  
  }  
  
  // 🔍 تصفية وحساب  
  function render() {  
    let search = document.getElementById("search").value.toLowerCase();  
    let classFilter = document.getElementById("classFilter").value;  
  
    // تأكد من وجود بيانات  
    if (!students || students.length === 0) {  
      console.warn("students NULL أو فارغة");  
      document.getElementById("present").innerText = "🔍 لا توجد بيانات";  
      document.getElementById("absent").innerText = "❌ لا توجد بيانات";  
      document.getElementById("rate").innerText = "📊 0%";  
      document.getElementById("best").innerText = "🏆 لا يوجد أفضل فصل";  
      document.getElementById("tableBody").innerHTML = "";  
      document.getElementById("insightText").innerText = "🚫 لا توجد بيانات لعرضها";  
      return;  
    }  
  
    // 1- فلتر الفصل  
    let filtered = students.filter(s => {  
      if (!s.class) return false;  
      if (classFilter === "all") return true;  
      return s.class === classFilter;  
    });  
  
    // 2- فلتر الاسم  
    filtered = filtered.filter(s => {  
      if (!s.name) return false;  
      if (search && !s.name.toLowerCase().includes(search)) return false;  
      return true;  
    });  
  
    console.log("الـ filtered بعد التصفية:", filtered);  
  
    // 📊 الحضور/الغياب (الاجتماع)  
    const present = filtered.filter(s => s.status === true).length;  
    const absent = filtered.length - present;  
    const rate = filtered.length ? Math.round((present / filtered.length) * 100) : 0;  
  
    document.getElementById("present").innerText = "✔️ الحضور: " + present;  
    document.getElementById("absent").innerText = "❌ الغياب: " + absent;  
    document.getElementById("rate").innerText = "📊 نسبة الحضور: " + rate + "%";  
  
    // 🏆 أفضل فصل  
    let statsByClass = {};  
    students.forEach(s => {  
      if (!s.class) return;  
      if (!statsByClass[s.class]) statsByClass[s.class] = { total: 0, present: 0 };  
      statsByClass[s.class].total++;  
      if (s.status === true) statsByClass[s.class].present++;  
    });  
  
    let bestClass = "-";  
    let maxRate = 0;  
    Object.keys(statsByClass).forEach(cls => {  
            const { total, present: presentByClass } = statsByClass[cls];  
      const r = total ? Math.round((presentByClass / total) * 100) : 0;  
      if (r > maxRate) {  
        maxRate = r;  
        bestClass = cls;  
      }  
    });  
    document.getElementById("best").innerText = "🏆 أفضل فصل: " + bestClass;  
  
    /* 📋 جدول التقرير */  
    const table = document.getElementById("tableBody");  
    table.innerHTML = "";  
  
    filtered.forEach(s => {  
      let status =  
        s.status === true && s.status2 === true  
          ? "كامل ✔️"  
          : s.status === true && s.status2 === false  
          ? "غاب فصل ⚠️"  
          : "غايب ❌";  
  
      table.innerHTML += `  
      <tr>  
        <td>${s.name || "غير معروف"}</td>  
        <td>${s.status === true ? "✔️" : "❌"}</td>  
        <td>${s.status2 === true ? "✔️" : "❌"}</td>  
        <td>${status}</td>  
      </tr>`;  
    });  
  
    /* 📊 رسوم */  
    draw(present, absent, rate);  
  
    /* 🧠 تحليل */  
    let text = rate > 80 ? "🔥 ممتاز" : "⚠️ يحتاج تحسين";  
    document.getElementById("insightText").innerText = "🧠 " + text;  
  }  
</script>  </body>  
</html>
